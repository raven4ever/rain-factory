name: Terraform fmt

# TFC speculative plans (via VCS integration) run validate + plan and post
# their status to the PR. This workflow only enforces `terraform fmt`, which
# TFC does NOT check. No TFC token, no init, no network.

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [master]
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt -check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
      - run: terraform fmt -check -recursive
