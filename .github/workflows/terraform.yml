name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - "orgs/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "orgs/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt-validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  plan:
    name: plan (${{ matrix.org }})
    needs: fmt-validate
    runs-on: ubuntu-latest
    # NOTE: until S3 backend wired (Phase 5b), CI uses local backend — every PR
    # shows a full creation plan because state is discarded at job end. Keep
    # informational only; do not gate merges on this output yet.
    concurrency:
      group: terraform-${{ matrix.org }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        org: [org1]
    defaults:
      run:
        working-directory: terraform
    env:
      # TFC API token (authenticates `terraform init` against app.terraform.io).
      # All Atlas secrets (atlas_public_key, atlas_private_key,
      # federation_settings_id, user_passwords) live in the TFC workspace as
      # sensitive Terraform variables — not in GitHub secrets.
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - run: terraform init
      - run: terraform workspace select ${{ matrix.org }} || terraform workspace new ${{ matrix.org }}
      - id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: false
