name: org1-dev
env: dev
awsAccount: "123456789012"
clusters:
  - name: primary
    provider: AWS
    region: US_EAST_1
    instanceSize: M10
    mongoVersion: "7.0"
    diskSizeGB: 20
    backup: true
    # Optional multi-region replica set. When `regions:` is present, the
    # top-level provider/region/instanceSize are ignored. Exactly one region
    # must have priority=7; sum of electableNodes across regions should be odd.
    # regions:
    #   - region: US_EAST_1
    #     provider: AWS
    #     priority: 7
    #     instanceSize: M10
    #     electableNodes: 3
    #   - region: EU_WEST_1
    #     provider: AWS
    #     priority: 6
    #     instanceSize: M10
    #     electableNodes: 2
    #   - region: US_WEST_2
    #     provider: AWS
    #     priority: 0
    #     instanceSize: M10
    #     readOnlyNodes: 1
users:
  - username: app-dev
    authType: SCRAM
    roles:
      - role: readWrite
        database: app
  - username: "arn:aws:iam::123456789012:role/dummy-atlas-readonly"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: read
        database: app
  - username: "arn:aws:iam::210987654321:role/dummy-atlas-readwrite"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: readWrite
        database: app
network:
  ipAccessList:
    - cidr: 10.0.0.0/8
      comment: corp-vpn

# Optional: pair the project with a customer AWS account via PrivateLink.
# Two-phase apply — see terraform/README.md → "PrivateLink".
# privateLink:
#   - region: US_EAST_1            # Atlas region
#     providerName: AWS
#     awsEndpointId: ""             # paste "vpce-..." after creating the AWS VPC endpoint

# Optional: Online Archive rules. Requires M10+ cluster.
# onlineArchive:
#   - clusterName: primary          # references clusters[].name in this file
#     database: app
#     collection: events
#     dateField: createdAt
#     dateFormat: ISODATE            # or EPOCH_SECONDS
#     expireAfterDays: 90
#     partitionFields:
#       - fieldName: tenantId
#         order: 0
#       - fieldName: createdAt
#         order: 1

# Optional: Atlas SQL Interface via Data Federation. Paid Atlas feature.
# Connect using the Atlas SQL JDBC/ODBC driver (not the standard mongo driver).
# sqlFederation:
#   - name: dev-fdi
#     stores:
#       - name: primary-store
#         clusterName: primary       # references clusters[].name in this file
#     databases:
#       - name: sql_app
#         collections:
#           - name: events
#             dataSources:
#               - storeName: primary-store
#                 database: app
#                 collection: events
