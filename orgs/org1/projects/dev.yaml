name: org1-dev
env: dev
awsAccount: "123456789012"
clusters:
  - name: primary
    provider: AWS
    region: US_EAST_1
    instanceSize: M10
    mongoVersion: "7.0"
    diskSizeGB: 20
    backup: true
users:
  - username: app-dev
    authType: SCRAM
    roles:
      - role: readWrite
        database: app
  - username: "arn:aws:iam::123456789012:role/dummy-atlas-readonly"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: read
        database: app
  - username: "arn:aws:iam::210987654321:role/dummy-atlas-readwrite"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: readWrite
        database: app
network:
  ipAccessList:
    - cidr: 10.0.0.0/8
      comment: corp-vpn

# Optional: pair the project with a customer AWS account via PrivateLink.
# Two-phase apply — see terraform/README.md → "PrivateLink".
# privateLink:
#   - region: US_EAST_1            # Atlas region
#     providerName: AWS
#     awsEndpointId: ""             # paste "vpce-..." after creating the AWS VPC endpoint
