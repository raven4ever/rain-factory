name: org1-dev
template: small-dev

# Cluster overrides (merged by .name against the template's clusters[]).
# Template small-dev defines primary as M10 / 20GB / backup=false; here we
# bump disk and enable backup. Other cluster fields inherit from template.
clusters:
  - name: my-super-cluster
    backup: true

users:
  - username: app-dev
    authType: SCRAM
    roles:
      - role: readWrite
        database: app
  - username: "arn:aws:iam::123456789012:role/dummy-atlas-readonly"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: read
        database: app
  - username: "arn:aws:iam::210987654321:role/dummy-atlas-readwrite"
    authType: AWS_IAM
    awsIamType: ROLE
    roles:
      - role: readWrite
        database: app

# Network overrides replace the template's ipAccessList entirely (no merge by .cidr).
# Omit this block to inherit the template's allow list as-is.
network:
  ipAccessList:
    - cidr: 10.0.0.0/8
      comment: corp-vpn

# Optional: pair the project with a customer AWS account via PrivateLink.
# Two-phase apply — see terraform/README.md → "PrivateLink".
# privateLink:
#   - region: US_EAST_1            # Atlas region
#     providerName: AWS
#     awsEndpointId: ""             # paste "vpce-..." after creating the AWS VPC endpoint

# Optional: Online Archive rules. Requires M10+ cluster.
# onlineArchive:
#   - clusterName: my-super-cluster          # references clusters[].name in this file
#     database: app
#     collection: events
#     dateField: createdAt
#     dateFormat: ISODATE            # or EPOCH_SECONDS
#     expireAfterDays: 90
#     partitionFields:
#       - fieldName: tenantId
#         order: 0
#       - fieldName: createdAt
#         order: 1

# Optional: Atlas SQL Interface via Data Federation. Paid Atlas feature.
# Connect using the Atlas SQL JDBC/ODBC driver (not the standard mongo driver).
# sqlFederation:
#   - name: dev-fdi
#     stores:
#       - name: primary-store
#         clusterName: my-super-cluster       # references clusters[].name in this file
#     databases:
#       - name: sql_app
#         collections:
#           - name: events
#             dataSources:
#               - storeName: primary-store
#                 database: app
#                 collection: events
